owner: repomind-dev
repo: upptime-qa

sites:
  # Este repo monitora APENAS o ambiente QA.
  # Para prod, ver repomind-dev/upptime-prod (criado no GO_LIVE).
  - name: Dashboard
    url: https://qa.repomind.dev
    headers:
      - "x-vercel-protection-bypass: $VERCEL_BYPASS_QA"
  - name: API
    url: https://api.qa.repomind.dev

status-website:
  cname: status-qa.repomind.dev
  logoUrl: https://raw.githubusercontent.com/repomind-dev/upptime-qa/master/logo.png
  favicon: https://raw.githubusercontent.com/repomind-dev/upptime-qa/master/logo.png
  themeUrl: https://raw.githubusercontent.com/repomind-dev/upptime-qa/master/assets/repomind-theme.css?v=2
  name: RepoMind Status (QA)
  introTitle: "**Status QA** — ambiente de pré-produção do RepoMind, atualizado a cada 5 minutos."
  introMessage: Página interna de status do ambiente QA. Para o status de produção, veja [status.repomind.dev](https://status.repomind.dev). Problemas? Abra uma [issue](https://github.com/repomind-dev/upptime-qa/issues).
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  metaTags:
    - name: "color-scheme"
      content: "dark"
    - name: "theme-color"
      content: "#0a0b10"
    - name: "description"
      content: "Status em tempo real dos serviços do RepoMind."
